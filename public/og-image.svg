<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a13"/>
      <stop offset="100%" style="stop-color:#1a1025"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#e879f9"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="35%">
      <stop offset="0%" style="stop-color:#e879f9;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#e879f9;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="150" cy="120" r="80" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.15"/>
  <circle cx="1050" cy="500" r="100" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.1"/>
  <circle cx="900" cy="150" r="50" fill="none" stroke="#f97316" stroke-width="0.5" opacity="0.2"/>
  <circle cx="300" cy="500" r="60" fill="none" stroke="#e879f9" stroke-width="0.5" opacity="0.2"/>

  <!-- Logo / Brand -->
  <text x="100" y="85" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="white">Lit</text>
  <text x="158" y="85" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="url(#grad)">Labs</text>

  <!-- Main headline -->
  <text x="100" y="260" font-family="system-ui, sans-serif" font-size="64" font-weight="900" fill="white">Build AI Agents</text>
  <text x="100" y="340" font-family="system-ui, sans-serif" font-size="64" font-weight="900" fill="url(#grad)">That Actually Work</text>

  <!-- Subheadline -->
  <text x="100" y="410" font-family="system-ui, sans-serif" font-size="24" fill="#a1a1aa">Create, deploy, and manage custom AI agents</text>
  <text x="100" y="445" font-family="system-ui, sans-serif" font-size="24" fill="#a1a1aa">on one clean platform.</text>

  <!-- Feature badges -->
  <rect x="100" y="490" width="120" height="36" rx="18" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1" opacity="0.3"/>
  <text x="160" y="514" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#f97316" text-anchor="middle">No-Code</text>

  <rect x="240" y="490" width="140" height="36" rx="18" fill="#e879f9" opacity="0.12" stroke="#e879f9" stroke-width="1" opacity="0.3"/>
  <text x="310" y="514" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#e879f9" text-anchor="middle">Multi-Agent</text>

  <rect x="400" y="490" width="130" height="36" rx="18" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
  <text x="465" y="514" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#22c55e" text-anchor="middle">24/7 Runtime</text>

  <!-- URL -->
  <text x="100" y="590" font-family="system-ui, sans-serif" font-size="18" fill="#52525b" font-weight="600">litlabs.net</text>

  <!-- Right side decorative element -->
  <g transform="translate(850, 180)">
    <!-- Agent cards illustration -->
    <rect x="0" y="0" width="250" height="140" rx="16" fill="white" opacity="0.03" stroke="white" stroke-width="1" opacity="0.08"/>
    <rect x="20" y="20" width="40" height="40" rx="10" fill="#f97316" opacity="0.15"/>
    <text x="40" y="48" font-size="20" text-anchor="middle">🤖</text>
    <rect x="75" y="25" width="120" height="12" rx="6" fill="white" opacity="0.08"/>
    <rect x="75" y="45" width="80" height="8" rx="4" fill="white" opacity="0.05"/>
    <rect x="20" y="80" width="60" height="8" rx="4" fill="white" opacity="0.05"/>
    <rect x="20" y="100" width="90" height="8" rx="4" fill="white" opacity="0.05"/>

    <rect x="30" y="170" width="250" height="140" rx="16" fill="white" opacity="0.03" stroke="white" stroke-width="1" opacity="0.08"/>
    <rect x="50" y="190" width="40" height="40" rx="10" fill="#e879f9" opacity="0.15"/>
    <text x="70" y="218" font-size="20" text-anchor="middle">💬</text>
    <rect x="105" y="195" width="120" height="12" rx="6" fill="white" opacity="0.08"/>
    <rect x="105" y="215" width="80" height="8" rx="4" fill="white" opacity="0.05"/>
    <rect x="50" y="250" width="70" height="8" rx="4" fill="white" opacity="0.05"/>
    <rect x="50" y="270" width="100" height="8" rx="4" fill="white" opacity="0.05"/>

    <!-- Connecting line -->
    <line x1="155" y1="140" x2="155" y2="170" stroke="url(#grad)" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
  </g>
</svg>
